kind = "web"
previewPath = "/"
title = "جسر المعرفة - Jisr Almareifa"
version = "1.0.0"
id = "artifacts/jisr-almareifa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22184

[services.development]
run = "pnpm --filter @workspace/jisr-almareifa run dev"

